<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japan Programs - Registration of Interest | GoodNews Japan</title>
    <meta
      name="description"
      content="Register your interest in Japan Programs connected to GoodNews Japan."
    />
    <meta name="theme-color" content="#080806" />
    <link
      rel="icon"
      type="image/png"
      href="https://assets.cdn.filesafe.space/pVxIE30GROfdQAaVsJgi/media/686f096a627f396723165ccf.png"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
        background: #050505;
        color: #fff;
        font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
      }

      body {
        min-height: 100svh;
      }

      .page {
        position: relative;
        display: flex;
        min-height: 100svh;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: clamp(28px, 5vw, 72px) 5vw;
      }

      .background-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .shade {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 18%, rgba(215, 180, 90, 0.2), rgba(0, 0, 0, 0.22) 36%, rgba(0, 0, 0, 0.78) 100%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.78));
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(100%, 980px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: clamp(22px, 4vw, 36px);
      }

      .brand img {
        width: 52px;
        height: 52px;
        object-fit: contain;
        filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.5));
      }

      .brand span {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(240, 215, 148, 0.9);
      }

      h1 {
        max-width: 820px;
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 5.7rem);
        font-weight: 600;
        letter-spacing: 0;
        line-height: 0.95;
        text-shadow: 0 18px 48px rgba(0, 0, 0, 0.72);
      }

      .intro {
        max-width: 660px;
        margin: 20px 0 clamp(26px, 5vw, 46px);
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.78);
        text-shadow: 0 10px 26px rgba(0, 0, 0, 0.75);
      }

      .form-panel {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      }

      .form-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        background: rgba(12, 12, 12, 0.96);
        padding: 18px clamp(18px, 4vw, 28px);
      }

      .form-header p {
        margin: 0;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(215, 180, 90, 0.9);
      }

      .home-link {
        color: rgba(255, 255, 255, 0.64);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 180ms ease;
        white-space: nowrap;
      }

      .home-link:hover {
        color: #fff;
      }

      .iframe-wrap {
        background: #fff;
        padding: 0;
      }

      #ziframe_185252 {
        display: block;
        height: 500px;
        width: 99%;
        border: none;
      }

      @media (max-width: 640px) {
        .page {
          align-items: flex-start;
          padding: 24px 14px 34px;
        }

        .brand img {
          width: 44px;
          height: 44px;
        }

        .form-header {
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <video
        class="background-video"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        poster="https://assets.cdn.filesafe.space/pVxIE30GROfdQAaVsJgi/media/686f096a627f396723165ccf.png"
      >
        <source
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260306_115329_5e00c9c5-4d69-49b7-94c3-9c31c60bb644.mp4"
          type="video/mp4"
        />
      </video>
      <div class="shade" aria-hidden="true"></div>

      <div class="shell">
        <div class="brand">
          <img
            src="https://assets.cdn.filesafe.space/pVxIE30GROfdQAaVsJgi/media/686f096a627f396723165ccf.png"
            alt=""
            width="52"
            height="52"
          />
          <span>GoodNews Japan 2026</span>
        </div>

        <h1>Japan Programs Registration of Interest</h1>
        <p class="intro">
          Register your interest and stay connected with the Japan Programs team.
        </p>

        <section class="form-panel" aria-label="Japan Programs registration of interest form">
          <div class="form-header">
            <p>Registration of Interest</p>
            <a class="home-link" href="/">Back to site</a>
          </div>
          <div class="iframe-wrap">
            <iframe
              id="ziframe_185252"
              aria-label="Japan Programs - Registration of Interest"
              frameborder="0"
              src="https://forms.zohopublic.eu/rikki/form/JapanProgramsRegistrationofInterest/formperma/yD7s_xMRXFNDZ8UYndDwhmFhvgtemMSANbCcjyCAe9g"
            >
            </iframe>
          </div>
        </section>
      </div>
    </main>

    <script type="text/javascript">
      (function() {
        try {
          var zf_frame = document.getElementById("ziframe_185252");
          var ifrmSrc = zf_frame.src;

          if (!((new RegExp("[?&]referrername=")).test(ifrmSrc))) {
            var rfr = window.location.href;

            try {
              rfr = window.self !== window.top ?
                window.top.location.href :
                (/^https?:\/\/[\w.-]+\.[a-zA-Z]{2,}/i.test(rfr) ? rfr : "");
            } catch (e) {}

            if (rfr && rfr !== "") {
              if (rfr.length > 1800) {
                var queryIndex = rfr.indexOf('?');
                if (queryIndex > -1) {
                  rfr = rfr.substring(0, queryIndex);
                }
                if (rfr.length > 1800) {
                  rfr = rfr.substring(0, 1800);
                }
              }
              ifrmSrc += ((ifrmSrc.indexOf('?') > 0) ? '&' : '?') + 'referrername=' + encodeURIComponent(rfr);
            }
          }
          if (zf_frame.src !== ifrmSrc) {
            zf_frame.src = ifrmSrc;
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
